<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaBlog - Livros, Filmes e Séries</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        header h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
            font-size: 1.1em;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        nav button {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 0.95em;
        }

        nav button:hover,
        nav button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
        }

        /* Search Bar */
        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-container input {
            flex: 1;
            min-width: 200px;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .search-container input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-container select {
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 25px;
            background: white;
            cursor: pointer;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .search-container select:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Form Section */
        .form-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .form-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: bold;
            color: #555;
            margin-bottom: 5px;
            font-size: 0.95em;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
            grid-column: 1 / -1;
        }

        .rating-group {
            display: flex;
            gap: 10px;
            align-items: center;
            grid-column: 1 / -1;
        }

        .star {
            font-size: 1.5em;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .star:hover {
            transform: scale(1.2);
        }

        .star.active {
            color: #ffc107;
        }

        .rating-value {
            color: #667eea;
            font-weight: bold;
            font-size: 1.1em;
        }

        .button-group {
            display: flex;
            gap: 10px;
            grid-column: 1 / -1;
            flex-wrap: wrap;
        }

        button {
            font-family: inherit;
        }

        .btn-primary {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1em;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            padding: 10px 20px;
            background: #e8e8e8;
            color: #333;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        /* Media Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .media-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .media-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.3);
        }

        .media-card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .media-icon {
            font-size: 2em;
        }

        .media-status {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .media-status.planejado {
            background: #ffc107;
        }

        .media-status.lendo {
            background: #17a2b8;
        }

        .media-status.concluido {
            background: #28a745;
        }

        .media-status.abandonado {
            background: #dc3545;
        }

        .media-card h3 {
            color: #333;
            margin-bottom: 5px;
            font-size: 1.3em;
        }

        .media-card .author {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .media-card .rating {
            color: #ffc107;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .media-card .review {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
            font-size: 0.95em;
            max-height: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .media-card-footer {
            display: flex;
            gap: 10px;
            border-top: 2px solid #eee;
            padding-top: 10px;
        }

        .btn-small {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85em;
            transition: all 0.2s;
        }

        .btn-edit {
            background: #17a2b8;
            color: white;
        }

        .btn-edit:hover {
            background: #138496;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        .modal-header h2 {
            color: #667eea;
            font-size: 1.5em;
        }

        .close-btn {
            font-size: 2em;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #333;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-body p {
            margin-bottom: 15px;
            line-height: 1.6;
            color: #555;
        }

        .modal-body strong {
            color: #667eea;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .empty-state h2 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #999;
            font-size: 1.1em;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .gallery {
                grid-template-columns: 1fr;
            }

            nav {
                gap: 8px;
            }

            nav button {
                padding: 8px 15px;
                font-size: 0.85em;
            }

            .modal-content {
                width: 95%;
                margin: 20% auto;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            header {
                padding: 20px;
            }

            header h1 {
                font-size: 1.5em;
            }

            .search-container {
                flex-direction: column;
            }

            .search-container input,
            .search-container select {
                width: 100%;
            }

            .button-group {
                flex-direction: column;
            }

            .btn-primary,
            .btn-secondary {
                width: 100%;
            }

            .media-card-footer {
                flex-direction: column;
            }

            .btn-small {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>📚 MediaBlog</h1>
            <p>Catálogo de Livros, Filmes e Séries - Com Suas Resenhas Pessoais</p>
        </header>

        <!-- Navigation -->
        <nav>
            <button class="filter-btn active" data-category="todos">Todos</button>
            <button class="filter-btn" data-category="livro">📚 Livros</button>
            <button class="filter-btn" data-category="filme">🎬 Filmes</button>
            <button class="filter-btn" data-category="serie">📺 Séries</button>
        </nav>

        <!-- Search and Filter -->
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="🔍 Buscar por título ou autor...">
            <select id="statusFilter">
                <option value="todos">Todos os Status</option>
                <option value="planejado">Planejado</option>
                <option value="lendo">Lendo/Assistindo</option>
                <option value="concluido">Concluído</option>
                <option value="abandonado">Abandonado</option>
            </select>
        </div>

        <!-- Form Section -->
        <div class="form-section">
            <h2>➕ Adicionar Nova Mídia</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="type">Tipo:</label>
                    <select id="type">
                        <option value="livro">📚 Livro</option>
                        <option value="filme">🎬 Filme</option>
                        <option value="serie">📺 Série</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="title">Título:</label>
                    <input type="text" id="title" placeholder="Digite o título">
                </div>

                <div class="form-group">
                    <label for="author">Autor/Diretor:</label>
                    <input type="text" id="author" placeholder="Digite o autor ou diretor">
                </div>

                <div class="form-group">
                    <label for="status">Status:</label>
                    <select id="status">
                        <option value="planejado">Planejado</option>
                        <option value="lendo">Lendo/Assistindo</option>
                        <option value="concluido">Concluído</option>
                        <option value="abandonado">Abandonado</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Avaliação:</label>
                    <div class="rating-group">
                        <span class="star" data-value="1">★</span>
                        <span class="star" data-value="2">★</span>
                        <span class="star" data-value="3">★</span>
                        <span class="star" data-value="4">★</span>
                        <span class="star" data-value="5">★</span>
                        <span class="rating-value">0/5</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="review">Sua Resenha:</label>
                    <textarea id="review" placeholder="Escreva sua resenha e opinião sobre o título..."></textarea>
                </div>

                <div class="button-group">
                    <button class="btn-primary" id="addBtn">Adicionar à Biblioteca</button>
                    <button class="btn-secondary" id="clearBtn">Limpar Formulário</button>
                </div>
            </div>
        </div>

        <!-- Gallery Section -->
        <div id="gallery" class="gallery"></div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-state-icon">📭</div>
            <h2>Sua biblioteca está vazia!</h2>
            <p>Adicione livros, filmes ou séries acima para começar.</p>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Detalhes</h2>
                <button class="close-btn" id="closeBtn">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        // Classe para gerenciar dados
        class MediaManager {
            constructor() {
                this.medias = this.loadFromLocalStorage();
                this.currentFilter = 'todos';
                this.currentStatusFilter = 'todos';
                this.searchTerm = '';
            }

            loadFromLocalStorage() {
                const data = localStorage.getItem('medias');
                if (data) {
                    return JSON.parse(data);
                }
                // Dados de exemplo
                return [
                    {
                        id: 1,
                        type: 'livro',
                        title: 'O Senhor dos Anéis',
                        author: 'J.R.R. Tolkien',
                        status: 'concluido',
                        rating: 5,
                        review: 'Uma obra-prima absoluta! A criatividade de Tolkien é incomparável. Mundo imersivo, personagens memoráveis e uma trama épica que te prende do início ao fim.'
                    },
                    {
                        id: 2,
                        type: 'filme',
                        title: 'Inception',
                        author: 'Christopher Nolan',
                        status: 'concluido',
                        rating: 5,
                        review: 'Filme revolucionário! A cinematografia é impecável e o conceito de sonhos dentro de sonhos é genial. Precisa assistir mais de uma vez para entender tudo.'
                    },
                    {
                        id: 3,
                        type: 'serie',
                        title: 'Breaking Bad',
                        author: 'Vince Gilligan',
                        status: 'concluido',
                        rating: 5,
                        review: 'A melhor série que já vi! Cada episódio é perfeito. A progressão do personagem Walter White é magistral e te prende até o final.'
                    }
                ];
            }

            saveToLocalStorage() {
                localStorage.setItem('medias', JSON.stringify(this.medias));
            }

            addMedia(type, title, author, status, rating, review) {
                const newMedia = {
                    id: Date.now(),
                    type,
                    title,
                    author,
                    status,
                    rating,
                    review
                };
                this.medias.push(newMedia);
                this.saveToLocalStorage();
                return newMedia;
            }

            deleteMedia(id) {
                this.medias = this.medias.filter(m => m.id !== id);
                this.saveToLocalStorage();
            }

            updateMedia(id, updates) {
                const media = this.medias.find(m => m.id === id);
                if (media) {
                    Object.assign(media, updates);
                    this.saveToLocalStorage();
                }
            }

            getFilteredMedias() {
                return this.medias.filter(media => {
                    const categoryMatch = this.currentFilter === 'todos' || media.type === this.currentFilter;
                    const statusMatch = this.currentStatusFilter === 'todos' || media.status === this.currentStatusFilter;
                    const searchMatch = media.title.toLowerCase().includes(this.searchTerm.toLowerCase()) ||
                                      media.author.toLowerCase().includes(this.searchTerm.toLowerCase());
                    return categoryMatch && statusMatch && searchMatch;
                });
            }
        }

        // Classe para gerenciar UI
        class UIManager {
            constructor(mediaManager) {
                this.manager = mediaManager;
                this.setupEventListeners();
                this.renderMedias();
            }

            setupEventListeners() {
                // Form buttons
                document.getElementById('addBtn').addEventListener('click', () => this.handleAddMedia());
                document.getElementById('clearBtn').addEventListener('click', () => this.clearForm());

                // Category filters
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => this.handleCategoryFilter(e));
                });

                // Search and status filter
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    this.manager.searchTerm = e.target.value;
                    this.renderMedias();
                });

                document.getElementById('statusFilter').addEventListener('change', (e) => {
                    this.manager.currentStatusFilter = e.target.value;
                    this.renderMedias();
                });

                // Rating stars
                document.querySelectorAll('.star').forEach(star => {
                    star.addEventListener('click', (e) => this.handleRating(e));
                });

                // Modal
                document.getElementById('closeBtn').addEventListener('click', () => this.closeModal());
                document.getElementById('modal').addEventListener('click', (e) => {
                    if (e.target.id === 'modal') this.closeModal();
                });
            }

            handleAddMedia() {
                const type = document.getElementById('type').value;
                const title = document.getElementById('title').value.trim();
                const author = document.getElementById('author').value.trim();
                const status = document.getElementById('status').value;
                const rating = document.querySelectorAll('.star.active').length;
                const review = document.getElementById('review').value.trim();

                if (!title || !author) {
                    alert('Por favor, preencha todos os campos obrigatórios!');
                    return;
                }

                this.manager.addMedia(type, title, author, status, rating, review);
                this.clearForm();
                this.renderMedias();
                alert('✅ Mídia adicionada com sucesso!');
            }

            clearForm() {
                document.getElementById('title').value = '';
                document.getElementById('author').value = '';
                document.getElementById('type').value = 'livro';
                document.getElementById('status').value = 'planejado';
                document.getElementById('review').value = '';
                document.querySelectorAll('.star').forEach(s => s.classList.remove('active'));
                document.querySelector('.rating-value').textContent = '0/5';
            }

            handleCategoryFilter(e) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                this.manager.currentFilter = e.target.dataset.category;
                this.renderMedias();
            }

            handleRating(e) {
                const value = parseInt(e.target.dataset.value);
                document.querySelectorAll('.star').forEach((star, index) => {
                    if (index < value) {
                        star.classList.add('active');
                    } else {
                        star.classList.remove('active');
                    }
                });
                document.querySelector('.rating-value').textContent = `${value}/5`;
            }

            getTypeIcon(type) {
                const icons = { livro: '📚', filme: '🎬', serie: '📺' };
                return icons[type] || '';
            }

            getStatusLabel(status) {
                const labels = {
                    planejado: 'Planejado',
                    lendo: 'Lendo/Assistindo',
                    concluido: 'Concluído',
                    abandonado: 'Abandonado'
                };
                return labels[status] || status;
            }

            renderMedias() {
                const gallery = document.getElementById('gallery');
                const emptyState = document.getElementById('emptyState');
                const medias = this.manager.getFilteredMedias();

                gallery.innerHTML = '';

                if (medias.length === 0) {
                    gallery.style.display = 'none';
                    emptyState.style.display = 'block';
                    return;
                }

                emptyState.style.display = 'none';
                gallery.style.display = 'grid';

                medias.forEach(media => {
                    const card = document.createElement('div');
                    card.className = 'media-card';
                    card.innerHTML = `
                        <div class="media-card-header">
                            <div class="media-icon">${this.getTypeIcon(media.type)}</div>
                            <span class="media-status ${media.status}">${this.getStatusLabel(media.status)}</span>
                        </div>
                        <h3>${media.title}</h3>
                        <div class="author">Por: ${media.author}</div>
                        <div class="rating">${'⭐'.repeat(media.rating)} ${media.rating}/5</div>
                        <div class="review">${media.review}</div>
                        <div class="media-card-footer">
                            <button class="btn-small btn-edit" onclick="window.uiManager.editMedia(${media.id})">✏️ Editar</button>
                            <button class="btn-small btn-delete" onclick="window.uiManager.deleteMedia(${media.id})">🗑️ Deletar</button>
                        </div>
                    `;
                    card.addEventListener('click', (e) => {
                        if (!e.target.classList.contains('btn-small')) {
                            this.openModal(media);
                        }
                    });
                    gallery.appendChild(card);
                });
            }

            openModal(media) {
                const modal = document.getElementById('modal');
                const modalTitle = document.getElementById('modalTitle');
                const modalBody = document.getElementById('modalBody');

                modalTitle.textContent = `${this.getTypeIcon(media.type)} ${media.title}`;
                modalBody.innerHTML = `
                    <p><strong>Tipo:</strong> ${media.type === 'livro' ? 'Livro' : media.type === 'filme' ? 'Filme' : 'Série'}</p>
                    <p><strong>Autor/Diretor:</strong> ${media.author}</p>
                    <p><strong>Status:</strong> ${this.getStatusLabel(media.status)}</p>
                    <p><strong>Avaliação:</strong> ${'⭐'.repeat(media.rating)} ${media.rating}/5</p>
                    <p><strong>Resenha:</strong></p>
                    <p>${media.review}</p>
                `;
                modal.style.display = 'block';
            }

            closeModal() {
                document.getElementById('modal').style.display = 'none';
            }

            deleteMedia(id) {
                if (confirm('Tem certeza que deseja deletar este item?')) {
                    this.manager.deleteMedia(id);
                    this.renderMedias();
                    alert('✅ Item deletado com sucesso!');
                }
            }

            editMedia(id) {
                const media = this.manager.medias.find(m => m.id === id);
                if (media) {
                    document.getElementById('type').value = media.type;
                    document.getElementById('title').value = media.title;
                    document.getElementById('author').value = media.author;
                    document.getElementById('status').value = media.status;
                    document.getElementById('review').value = media.review;

                    // Set rating
                    document.querySelectorAll('.star').forEach((star, index) => {
                        if (index < media.rating) {
                            star.classList.add('active');
                        } else {
                            star.classList.remove('active');
                        }
                    });
                    document.querySelector('.rating-value').textContent = `${media.rating}/5`;

                    // Change button to update
                    const addBtn = document.getElementById('addBtn');
                    addBtn.textContent = 'Atualizar Mídia';
                    addBtn.onclick = () => {
                        this.manager.updateMedia(id, {
                            type: document.getElementById('type').value,
                            title: document.getElementById('title').value,
                            author: document.getElementById('author').value,
                            status: document.getElementById('status').value,
                            review: document.getElementById('review').value,
                            rating: document.querySelectorAll('.star.active').length
                        });
                        this.clearForm();
                        addBtn.textContent = 'Adicionar à Biblioteca';
                        addBtn.onclick = () => this.handleAddMedia();
                        this.renderMedias();
                        alert('✅ Mídia atualizada com sucesso!');
                    };

                    // Scroll to form
                    document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth' });
                }
            }
        }

        // Initialize
        const mediaManager = new MediaManager();
        const uiManager = new UIManager(mediaManager);
        window.uiManager = uiManager; // Make available globally for inline onclick
    </script>
</body>
</html>
