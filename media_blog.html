<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaBlog - Seu Diário de Livros, Filmes e Séries</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 40px;
            text-align: center;
        }

        header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
            font-size: 1.1em;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .nav-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-filter {
            background: #e0e7ff;
            color: #667eea;
        }

        .btn-filter.active {
            background: #667eea;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 50px auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .close-modal {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close-modal:hover {
            color: #000;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e7ff;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            background-color: #f8f9ff;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .rating-input {
            display: flex;
            gap: 10px;
            font-size: 2em;
        }

        .star {
            cursor: pointer;
            color: #ddd;
            transition: all 0.2s;
        }

        .star:hover,
        .star.active {
            color: #ffd700;
            transform: scale(1.2);
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            animation: cardAppear 0.5s ease;
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.3);
        }

        .card-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .card-type {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            font-size: 0.85em;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .card-title {
            font-size: 1.5em;
            margin-bottom: 5px;
        }

        .card-subtitle {
            font-size: 0.95em;
            opacity: 0.9;
        }

        .card-body {
            padding: 20px;
        }

        .card-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .info-item {
            color: #666;
        }

        .info-label {
            font-weight: bold;
            color: #333;
            display: block;
            margin-bottom: 5px;
        }

        .rating {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .rating .star {
            color: #ffd700;
        }

        .review-text {
            color: #555;
            line-height: 1.6;
            margin-bottom: 15px;
            font-style: italic;
            border-left: 4px solid #667eea;
            padding-left: 15px;
            background: #f8f9ff;
            padding: 15px;
            border-radius: 5px;
        }

        .card-footer {
            padding: 15px 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }

        .btn-delete {
            background: #ff6b6b;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .btn-delete:hover {
            background: #ff5252;
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state h2 {
            font-size: 2em;
            margin-bottom: 20px;
        }

        .empty-state p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .modal-content {
                margin: 100px 20px;
                width: calc(100% - 40px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>📚🎬🎭 MediaBlog</h1>
            <p>Seu diário pessoal de livros, filmes e séries</p>
            <div class="nav-buttons">
                <button class="btn-primary" onclick="openAddModal()">+ Adicionar Novo</button>
                <button class="btn-primary" onclick="downloadData()">⬇️ Baixar Dados</button>
            </div>
        </header>

        <!-- Stats -->
        <div class="stats" id="statsContainer"></div>

        <!-- Filters -->
        <div class="filters">
            <button class="btn-filter active" onclick="filterByType('todos')">Todos</button>
            <button class="btn-filter" onclick="filterByType('livro')">📚 Livros</button>
            <button class="btn-filter" onclick="filterByType('filme')">🎬 Filmes</button>
            <button class="btn-filter" onclick="filterByType('serie')">🎭 Séries</button>
        </div>

        <!-- Grid de Cards -->
        <div class="grid" id="gridContainer"></div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <h2>Nenhuma entrada encontrada</h2>
            <p>Comece adicionando seus livros, filmes e séries favoritos!</p>
        </div>
    </div>

    <!-- Modal para Adicionar -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeAddModal()">&times;</span>
            <h2>Adicionar Novo Item</h2>
            <form onsubmit="addItem(event)">
                <div class="form-group">
                    <label>Tipo</label>
                    <select id="itemType" required onchange="updateTypeField()">
                        <option value="livro">📚 Livro</option>
                        <option value="filme">🎬 Filme</option>
                        <option value="serie">🎭 Série</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Título</label>
                    <input type="text" id="itemTitle" placeholder="Ex: Senhor dos Anéis" required>
                </div>

                <div class="form-group">
                    <label id="authorLabel">Autor/Diretor</label>
                    <input type="text" id="itemAuthor" placeholder="Ex: J.R.R. Tolkien" required>
                </div>

                <div class="form-group">
                    <label>Ano</label>
                    <input type="number" id="itemYear" placeholder="Ex: 2023" min="1900" max="2099" required>
                </div>

                <div class="form-group">
                    <label>Gênero</label>
                    <input type="text" id="itemGenre" placeholder="Ex: Ficção Científica" required>
                </div>

                <div class="form-group">
                    <label>Status</label>
                    <select id="itemStatus" required>
                        <option value="lido">Lido/Assistido</option>
                        <option value="lendo">Lendo/Assistindo</option>
                        <option value="planejado">Planejado</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Classificação</label>
                    <div class="rating-input" id="ratingInput">
                        <span class="star" data-value="1" onclick="setRating(1)">★</span>
                        <span class="star" data-value="2" onclick="setRating(2)">★</span>
                        <span class="star" data-value="3" onclick="setRating(3)">★</span>
                        <span class="star" data-value="4" onclick="setRating(4)">★</span>
                        <span class="star" data-value="5" onclick="setRating(5)">★</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Sua Resenha</label>
                    <textarea id="itemReview" placeholder="Compartilhe suas impressões, o que achou, recomendações..." required></textarea>
                </div>

                <button type="submit" class="btn-submit">Adicionar ao Blog</button>
            </form>
        </div>
    </div>

    <script>
        let currentRating = 0;
        let currentFilter = 'todos';
        let items = [];

        // Carregar dados do localStorage ao iniciar
        function loadItems() {
            const saved = localStorage.getItem('mediaBlogItems');
            items = saved ? JSON.parse(saved) : [];
            renderItems();
            updateStats();
        }

        // Salvar dados no localStorage
        function saveItems() {
            localStorage.setItem('mediaBlogItems', JSON.stringify(items));
            updateStats();
        }

        // Abrir modal
        function openAddModal() {
            document.getElementById('addModal').style.display = 'block';
            currentRating = 0;
            document.querySelectorAll('.rating-input .star').forEach(star => star.classList.remove('active'));
            document.getElementById('itemType').value = 'livro';
            updateTypeField();
        }

        // Fechar modal
        function closeAddModal() {
            document.getElementById('addModal').style.display = 'none';
            document.getElementById('addModal').style.display = 'none';
            document.getElementById('itemTitle').value = '';
            document.getElementById('itemAuthor').value = '';
            document.getElementById('itemYear').value = '';
            document.getElementById('itemGenre').value = '';
            document.getElementById('itemReview').value = '';
        }

        // Atualizar label conforme tipo
        function updateTypeField() {
            const type = document.getElementById('itemType').value;
            const label = document.getElementById('authorLabel');
            if (type === 'filme' || type === 'serie') {
                label.textContent = 'Diretor/Criador';
            } else {
                label.textContent = 'Autor';
            }
        }

        // Definir classificação
        function setRating(value) {
            currentRating = value;
            document.querySelectorAll('.rating-input .star').forEach((star, index) => {
                if (index < value) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }

        // Adicionar item
        function addItem(event) {
            event.preventDefault();

            if (currentRating === 0) {
                alert('Por favor, selecione uma classificação!');
                return;
            }

            const newItem = {
                id: Date.now(),
                type: document.getElementById('itemType').value,
                title: document.getElementById('itemTitle').value,
                author: document.getElementById('itemAuthor').value,
                year: document.getElementById('itemYear').value,
                genre: document.getElementById('itemGenre').value,
                status: document.getElementById('itemStatus').value,
                rating: currentRating,
                review: document.getElementById('itemReview').value,
                dateAdded: new Date().toLocaleDateString('pt-BR')
            };

            items.unshift(newItem);
            saveItems();
            renderItems();
            closeAddModal();
            alert('Item adicionado com sucesso!');
        }

        // Deletar item
        function deleteItem(id) {
            if (confirm('Tem certeza que deseja deletar este item?')) {
                items = items.filter(item => item.id !== id);
                saveItems();
                renderItems();
            }
        }

        // Filtrar por tipo
        function filterByType(type) {
            currentFilter = type;
            document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderItems();
        }

        // Gerar estrelas
        function generateStars(rating) {
            let stars = '';
            for (let i = 0; i < 5; i++) {
                stars += i < rating ? '★' : '☆';
            }
            return stars;
        }

        // Renderizar items
        function renderItems() {
            const grid = document.getElementById('gridContainer');
            const empty = document.getElementById('emptyState');
            
            let filteredItems = items;
            if (currentFilter !== 'todos') {
                filteredItems = items.filter(item => item.type === currentFilter);
            }

            if (filteredItems.length === 0) {
                grid.innerHTML = '';
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            grid.innerHTML = filteredItems.map(item => `
                <div class="card">
                    <div class="card-header">
                        <div class="card-type">${getEmoji(item.type)} ${item.type.toUpperCase()}</div>
                        <div class="card-title">${item.title}</div>
                        <div class="card-subtitle">${item.author} (${item.year})</div>
                    </div>
                    <div class="card-body">
                        <div class="card-info">
                            <div class="info-item">
                                <span class="info-label">Gênero</span>
                                ${item.genre}
                            </div>
                            <div class="info-item">
                                <span class="info-label">Status</span>
                                ${capitalizeFirst(item.status)}
                            </div>
                        </div>
                        <div class="rating">
                            ${generateStars(item.rating).split('').map(star => `<span class="star">${star}</span>`).join('')}
                        </div>
                        <div class="review-text">
                            "${item.review}"
                        </div>
                        <div style="font-size: 0.85em; color: #999; margin-top: 10px;">
                            Adicionado em: ${item.dateAdded}
                        </div>
                    </div>
                    <div class="card-footer">
                        <button class="btn-delete" onclick="deleteItem(${item.id})">🗑️ Deletar</button>
                    </div>
                </div>
            `).join('');
        }

        // Helper functions
        function getEmoji(type) {
            const emojis = { 'livro': '📚', 'filme': '🎬', 'serie': '🎭' };
            return emojis[type] || '📖';
        }

        function capitalizeFirst(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        // Atualizar estatísticas
        function updateStats() {
            const stats = document.getElementById('statsContainer');
            const totalItems = items.length;
            const totalLivros = items.filter(i => i.type === 'livro').length;
            const totalFilmes = items.filter(i => i.type === 'filme').length;
            const totalSeries = items.filter(i => i.type === 'serie').length;
            const averageRating = items.length > 0 
                ? (items.reduce((sum, i) => sum + i.rating, 0) / items.length).toFixed(1) 
                : 0;

            stats.innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${totalItems}</div>
                    <div class="stat-label">Total de Itens</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${totalLivros}</div>
                    <div class="stat-label">📚 Livros</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${totalFilmes}</div>
                    <div class="stat-label">🎬 Filmes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${totalSeries}</div>
                    <div class="stat-label">🎭 Séries</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${averageRating}</div>
                    <div class="stat-label">⭐ Nota Média</div>
                </div>
            `;
        }

        // Baixar dados como JSON
        function downloadData() {
            const dataStr = JSON.stringify(items, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `mediablog_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
        }

        // Fechar modal ao clicar fora
        window.onclick = function(event) {
            const modal = document.getElementById('addModal');
            if (event.target == modal) {
                closeAddModal();
            }
        }

        // Inicializar
        loadItems();
    </script>
</body>
</html>
